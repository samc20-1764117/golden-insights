<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>All Videos — Golden Insights</title>
  <meta name="description" content="Browse every Golden Insights Tableau tutorial — searchable and filterable by topic.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='46' fill='%23C99A2E'/><text x='50' y='66' font-size='48' text-anchor='middle' fill='white' font-family='Georgia'>G</text></svg>">

<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="index.html"><span class="dot">G</span>Golden Insights</a>
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="videos.html" class="active">Videos</a>

        <a href="assets.html">Assets</a>
        <a href="about.html">About</a>

  <section class="block wrap">

    <p class="count-note" style="margin-top:0">Browse the topic rows below, or search &amp; filter to see everything at once. Click any thumbnail to play it right here.</p>

      <input type="search" id="search" placeholder="Search tutorials… e.g. donut, KPI, sankey">
      <select id="sort">
        <option value="newest">Newest first</option>

    <div class="chips" id="chips" style="margin-bottom:22px"></div>
    <p class="count-note" id="result-count"></p>
    <div class="grid" id="video-grid"></div>

  <footer class="site-footer">

      <span>© Golden Insights · Made with ☕ and 🐕</span>
      <div class="links">
        <a href="https://www.youtube.com/@golden_insights" target="_blank" rel="noopener">YouTube</a>
