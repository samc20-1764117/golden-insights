name: Sync new YouTube videos

on:
  schedule:
    - cron: "0 13 * * 1"   # Mondays 13:00 UTC
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Merge new videos from the channel feed
        run: python3 scripts/sync_videos.py

      - name: Commit if anything changed
        run: |
          if git diff --quiet data/videos.json; then
            echo "Nothing new this week."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/videos.json
          git commit -m "Auto-sync: new videos from YouTube feed"
          git push
